name: CI

on:
  push:
    paths:
      - "dimos-robot-test/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "dimos-robot-test/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: dimos-robot-test

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: dimos-robot-test/pyproject.toml

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Unit and contract tests (no hardware / mujoco / slow)
        run: bash scripts/ci_run.sh

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-py${{ matrix.python-version }}
          path: dimos-robot-test/artifacts/junit.xml

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-py${{ matrix.python-version }}
          path: dimos-robot-test/artifacts/summary.json
