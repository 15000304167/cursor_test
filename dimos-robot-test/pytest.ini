[pytest]
testpaths = tests
pythonpath = src
addopts = -ra --strict-markers --tb=short --timeout=300
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: fast tests without DimOS process
    contract: MCP tool list / schema vs golden
    integration: needs running stack or dimos CLI
    sim: simulation or replay profile
    hardware: real robot — requires HARDWARE_TEST_ACK
    mcp: MCP layer
    slow: long-running
    mujoco: MuJoCo-backed simulation
